{% extends 'base.html' %}
{% block title %}Password Reset Complete — LPU BSC{% endblock %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;background:linear-gradient(135deg,var(--green-dark),var(--green-mid));">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="text-center mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
                    <h2 style="font-family:'Playfair Display',serif;color:white;font-weight:900;">Success!</h2>
                </div>
                <div class="card shadow-lg">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Password Reset Complete</h5>
                        <p class="mb-4">
                            Your password has been successfully reset. 
                            You can now log in with your new password.
                        </p>
                        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Go to Login Page
                        </a>
                        <hr class="my-3">
                        <p class="text-center small text-muted mb-0">
                            Having trouble? <a href="{% url 'home' %}" class="text-green">Visit Home Page</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
