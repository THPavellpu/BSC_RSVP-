{% extends 'base.html' %}
{% block title %}Edit Profile — LPU BSC{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1><i class="bi bi-pencil me-3"></i>Edit Profile</h1></div></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-card">
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row g-3">
                            {% for field in form %}
                            <div class="col-md-{% if field.name == 'bio' %}12{% else %}6{% endif %}">
                                <label class="form-label">{{ field.label }}</label>
                                {{ field }}
                                {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
                            </div>
                            {% endfor %}
                            <div class="col-12 d-flex gap-3 justify-content-end mt-3">
                                <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-gold px-4"><i class="bi bi-check2 me-2"></i>Save Changes</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
