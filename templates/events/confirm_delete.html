{% extends 'base.html' %}
{% block title %}Delete Event{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size:4rem;"></i>
                    <h3 class="mt-3 font-serif">Delete Event?</h3>
                    <p class="text-muted">Are you sure you want to delete <strong>{{ event.title }}</strong>? This will also delete all RSVPs and tickets. This action cannot be undone.</p>
                    <div class="d-flex gap-3 justify-content-center mt-4">
                        <a href="{% url 'event_detail' event.slug %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-2"></i>Yes, Delete</button></form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
